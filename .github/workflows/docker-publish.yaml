name: Build and Publish
on:
  push:
    branches: [main]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Add QEMU to emulate arm64 on the x86 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Setup Docker Buildx (required for multi-arch)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 3. List the architectures you want to support
          platforms: linux/amd64,linux/arm64
          tags: |
            docker.io/nalits/opencode-secured:latest
            docker.io/nalits/opencode-secured:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max